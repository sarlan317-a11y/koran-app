<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generator Koran Otomatis - Luwu Raya Pos</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
// ✅ FIX: tanpa proxy (biar stabil di Vercel)
function getProxyUrl(url) {
    return url || "";
}

const DEFAULT_LOGO = "https://luwurayapos.com/wp-content/uploads/2026/04/image-1-copy.png";
const DEFAULT_BANNER = "https://luwurayapos.com/wp-content/uploads/2026/04/Copy-of-Jasa-Promosi-Iklan-2.jpg";

let pagesData = [{
    title: "",
    content: "",
    newsImage: "",
    imgPosX: 50,
    imgPosY: 50,
    link: "www.luwurayapos.com",
    date: new Date().toISOString().split('T')[0],
    fontSize: 10
}];

let currentPageIndex = 0;

// ================== PAGE ==================
window.addPage = function() {
    pagesData.push({...pagesData[0]});
    currentPageIndex = pagesData.length - 1;
    refreshUI();
};

window.removePage = function(e, index) {
    if (e) e.stopPropagation();
    if (pagesData.length <= 1) return;
    pagesData.splice(index, 1);
    currentPageIndex = Math.max(0, currentPageIndex - 1);
    refreshUI();
};

window.goToPage = function(index) {
    currentPageIndex = index;
    syncEditorWithPage();
    renderFlow();
};

// ================== UPDATE ==================
window.updateCurrentPageData = function() {
    const p = pagesData[currentPageIndex];

    p.title = document.getElementById('inputTitle').value;
    p.content = document.getElementById('inputContent').value;
    p.link = document.getElementById('inputLink').value;
    p.date = document.getElementById('inputDate').value;
    p.newsImage = document.getElementById('inputNewsImgUrl').value;
    p.imgPosX = document.getElementById('imgPosX').value;
    p.imgPosY = document.getElementById('imgPosY').value;
    p.fontSize = document.getElementById('inputFontSize').value;

    document.getElementById('fontSizeVal').innerText = p.fontSize + 'pt';

    renderFlow();
};

// ================== RENDER ==================
function renderFlow() {
    const container = document.getElementById('allPagesContainer');

    container.innerHTML = pagesData.map((p, i) => `
    <div class="preview-scale-wrapper">
        <div class="newspaper-page">
            <div class="masthead">
                <img src="${DEFAULT_LOGO}" height="50">
                <div>${new Date(p.date).toLocaleDateString('id-ID')}</div>
            </div>

            <img src="${DEFAULT_BANNER}" style="width:100%;height:90px;object-fit:contain">

            <h2 class="headline">${p.title || 'JUDUL'}</h2>

            <div class="content-body">
                <div style="flex:1;font-size:${p.fontSize}pt">
                    ${p.content.replace(/\n/g,"<br>")}
                </div>

                <div style="width:40%">
                    ${p.newsImage ? `
                        <div style="
                            height:200px;
                            background-image:url('${p.newsImage}');
                            background-size:cover;
                            background-position:${p.imgPosX}% ${p.imgPosY}%;
                        "></div>
                    ` : `<div style="height:200px;background:#eee;display:flex;align-items:center;justify-content:center">FOTO</div>`}
                </div>
            </div>

            <div class="footer">${p.link}</div>
        </div>
    </div>
    `).join('');
}

// ================== SYNC ==================
function syncEditorWithPage() {
    const p = pagesData[currentPageIndex];

    inputTitle.value = p.title;
    inputContent.value = p.content;
    inputLink.value = p.link;
    inputDate.value = p.date;
    inputNewsImgUrl.value = p.newsImage;
    imgPosX.value = p.imgPosX;
    imgPosY.value = p.imgPosY;
    inputFontSize.value = p.fontSize;

    fontSizeVal.innerText = p.fontSize + 'pt';
}

// ================== PRINT FIX ==================
window.triggerPrint = function() {
    window.print();
};

// ================== INIT ==================
window.onload = () => {
    document.querySelectorAll("input, textarea").forEach(el=>{
        el.addEventListener("input", updateCurrentPageData);
    });
    refreshUI();
};

function refreshUI() {
    renderFlow();
    syncEditorWithPage();
}
</script>

<style>
body {
    display: flex;
    margin: 0;
    background: #111827;
    font-family: Arial;
}

/* PANEL */
.editor-panel {
    width: 350px;
    background: white;
    padding: 15px;
    overflow-y: auto;
}

.preview-panel {
    flex: 1;
    padding: 20px;
    display: flex;
    justify-content: center;
}

/* PAGE */
.newspaper-page {
    width: 210mm;
    height: 297mm;
    background: white;
    padding: 10mm;
    display: flex;
    flex-direction: column;
}

.headline {
    text-align: center;
    font-weight: bold;
    margin: 10px 0;
}

.content-body {
    display: flex;
    gap: 10px;
    flex: 1;
}

.footer {
    font-size: 10px;
    text-align: center;
}

/* PRINT FIX */
@media print {
    body {
        background: white !important;
    }

    .editor-panel {
        display: none;
    }

    .preview-panel {
        padding: 0;
    }
}
</style>
</head>

<body>

<div class="editor-panel">
    <h2>Editor</h2>

    <input id="inputTitle" placeholder="Judul"><br><br>
    <textarea id="inputContent" placeholder="Isi berita"></textarea><br><br>

    <input id="inputNewsImgUrl" placeholder="URL Gambar"><br><br>

    <label>X</label>
    <input type="range" id="imgPosX" min="0" max="100"><br>

    <label>Y</label>
    <input type="range" id="imgPosY" min="0" max="100"><br>

    <label>Font</label>
    <input type="range" id="inputFontSize" min="8" max="15">
    <span id="fontSizeVal">10pt</span><br><br>

    <input id="inputDate" type="date"><br><br>
    <input id="inputLink" placeholder="Link"><br><br>

    <button onclick="addPage()">+ Halaman</button>
    <button onclick="triggerPrint()">Cetak</button>
</div>

<div class="preview-panel">
    <div id="allPagesContainer"></div>
</div>

</body>
</html>
